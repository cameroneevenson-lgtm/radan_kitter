[pytest]
# tests/_tmp and tests/_tmp_probe hold ad hoc scratch dirs from past test runs
# (already gitignored). Some leftover subdirectories under them have ACLs
# that deny access even to reads (Get-Acl itself fails), which otherwise
# makes a bare `pytest` invocation fail at collection time.
norecursedirs = _tmp _tmp_probe .git __pycache__
